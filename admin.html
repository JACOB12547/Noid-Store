<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - NOID STORE</title>
    <link rel="stylesheet" href="style.css">
    <style>

        header {
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }       
        body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #121212;
        color: #ffffff;
        margin: 0;
        padding: 20px;
        }
        .admin-container {
            max-width: 640px;
            margin: 0 auto;
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
        }


        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #a0a0a0; font-size: 0.9em; }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background-color: #121212;
            color: white;
            border: 1px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus { outline: none; border-color: #ffffff; }


        .btn-guardar {
            width: 100%;
            background-color: #ffffff;
            color: #121212;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        .btn-guardar:hover { background-color: #e0e0e0; }


        .btn-cancelar {
            display: none;
            width: 100%;
            background-color: transparent;
            color: #a0a0a0;
            border: 1px solid #333;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 8px;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-cancelar:hover { border-color: #ffffff; color: #ffffff; }


        .lista-admin { margin-top: 30px; text-align: left; }
        .lista-admin h3 { margin-bottom: 15px; color: #a0a0a0; text-transform: uppercase; font-size: 0.85em; letter-spacing: 2px; }

        .item-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #121212;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            gap: 12px;
            transition: border-color 0.2s;
        }
        .item-admin:hover { border-color: #444; }


        .item-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0; 
        }
        .item-thumb {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 6px;
            background-color: #fff;
            flex-shrink: 0;
        }
        .item-info > div {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }
        .item-info strong {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.95em;
        }
        .item-precio { font-size: 0.85em; color: #a0a0a0; }
        .tag-categoria {
            flex-shrink: 0;
            font-size: 0.75em;
            background-color: #2a2a2a;
            padding: 3px 10px;
            border-radius: 20px;
            color: #a0a0a0;
            white-space: nowrap;
        }


        .item-acciones { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-accion {
            padding: 7px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.78em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s, color 0.2s;
        }
        .btn-editar  { background-color: #ffffff; color: #121212; border: none; }
        .btn-editar:hover  { background-color: #d0d0d0; }
        .btn-eliminar { background-color: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; }
        .btn-eliminar:hover { background-color: #ff4d4d; color: #ffffff; }

        .modo-edicion .admin-container { border: 1px solid #555; }

        .separador { border: none; border-top: 1px solid #2a2a2a; margin: 35px 0; }

        .form-nueva-cat { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-categoria {
            flex: 1;
            padding: 10px;
            background-color: #121212;
            color: white;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        .input-categoria:focus { outline: none; border-color: #ffffff; }
        .btn-agregar-cat {
            background-color: #ffffff;
            color: #121212;
            border: none;
            padding: 10px 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            white-space: nowrap;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
        }
        .btn-agregar-cat:hover { background-color: #e0e0e0; }

        .lista-categorias-tags { display: flex; flex-wrap: wrap; gap: 10px; min-height: 36px; }
        .categoria-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.9em;
            transition: border-color 0.2s;
        }
        .categoria-tag:hover { border-color: #555; }
        .btn-eliminar-cat {
            background: none;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.85em;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .btn-eliminar-cat:hover { color: #ff4d4d; }
    </style>
</head>
<body>

    <header>
        <h1>NOID STORE</h1>
        <p>Panel de Administración</p>
        <a href="index.html" style="color:#a0a0a0;text-decoration:none;font-size:0.9em;">&larr; Volver a la tienda</a>
    </header>

    <main class="admin-container">

        <h2 id="form-titulo">Añadir Nuevo Producto</h2>

        <form id="form-producto">
            <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" required placeholder="Ej: Gorra Classic">
            </div>
            <div class="form-group">
                <label for="precio">Precio (COP)</label>
                <input type="number" id="precio" required placeholder="Ej: 55000" min="0">
            </div>
            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria">
                    <option value="Gorras">Gorras</option>
                    <option value="Camisetas">Camisetas</option>
                    <option value="Buzos">Buzos</option>
                </select>
            </div>
            <div class="form-group">
                <label for="imagen">URL de la Imagen</label>
                <input type="url" id="imagen" required placeholder="https://ejemplo.com/imagen.jpg">
            </div>

            <button type="submit" class="btn-guardar">Guardar Producto</button>
            <button type="button" id="btn-cancelar" class="btn-cancelar" onclick="cancelarEdicion()">✕ Cancelar edición</button>
        </form>

        <div class="lista-admin" id="lista-admin">
            <h3>Productos Actuales</h3>
        </div>

        <hr class="separador">

        <h2>Gestionar Categorías</h2>
        <p style="color:#a0a0a0;font-size:0.88em;margin-top:-8px;margin-bottom:16px;">
            Las categorías aparecen como filtros en la tienda y en el selector del formulario.
        </p>

        <div class="form-nueva-cat">
            <input type="text" id="nueva-categoria" class="input-categoria"
                   placeholder="Ej: Nuevos Ingresos" maxlength="40">
            <button onclick="agregarCategoria()" class="btn-agregar-cat">+ Agregar</button>
        </div>

        <div id="lista-categorias" class="lista-categorias-tags"></div>

    </main>

    <script src="admin.js"></script>
</body>
</html>
